name: Build installers

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller openpyxl

      - name: Build exe
        run: pyinstaller expense_analyzer.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnalyzDebitCredit-Windows
          path: dist/AnalyzDebitCredit.exe
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AnalyzDebitCredit.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pyinstaller openpyxl

      - name: Build app
        run: pyinstaller expense_analyzer.spec

      - name: Create dmg
        run: |
          hdiutil create \
            -volname "AnalyzDebitCredit" \
            -srcfolder "dist/AnalyzDebitCredit.app" \
            -ov -format UDZO \
            "dist/AnalyzDebitCredit.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: AnalyzDebitCredit-macOS
          path: dist/AnalyzDebitCredit.dmg
          retention-days: 30

      - name: Attach to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/AnalyzDebitCredit.dmg
